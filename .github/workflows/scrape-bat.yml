name: Scrape BaT auction results

on:
  schedule:
    # Daily at 09:15 UTC (~02:15 PT / ~05:15 ET).
    # Off the top of the hour to avoid GitHub Actions scheduling backlogs.
    - cron: '15 9 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: 'Pages to fetch (60 listings each). Ignored if "Full backfill" is checked.'
        required: false
        default: '3'
      full_backfill:
        description: 'Full backfill: fetch entire BaT sold-auction archive (~80 min, ~193k listings)'
        required: false
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Big backfills are slow: ~1.5s per page × pages. 200 pages ~ 5 min,
    # 1000 pages ~ 25 min. Headroom for occasional one-shot historical runs.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (uses packageManager from package.json)
        run: corepack enable

      - name: Install deps
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # 99999 is intentionally absurd — the scraper self-limits when it
          # hits BaT's reported pages_total (~3,222 at per_page=60).
          SCRAPE_PAGES: ${{ (inputs.full_backfill && '99999') || inputs.pages || '3' }}
        run: pnpm scrape:bat
